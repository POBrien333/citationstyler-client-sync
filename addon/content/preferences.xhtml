<linkset>
  <html:link rel="localization" href="citationstyler-sync-preferences.ftl" />
</linkset>

<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <html:div style="display:flex; align-items:baseline; gap:10px; margin-bottom:4px;">
    <html:h2 data-l10n-id="citationstyler-sync-prefs-title" style="margin:0;"></html:h2>
    <html:span id="prefs-version" style="font-size:12px;"></html:span>
  </html:div>

  <!-- Email -->
  <hbox align="center" style="margin-bottom:8px;">
    <html:label data-l10n-id="citationstyler-sync-email-label"
      style="min-width:120px; font-weight:600; font-size:13px;"></html:label>
    <html:input id="prefs-email-input" type="email"
      style="flex:1; padding:6px 10px; border:1px solid #ccc; border-radius:4px; font-size:13px;" />
  </hbox>

  <!-- License Key -->
  <hbox align="center" style="margin-bottom:12px;">
    <html:label data-l10n-id="citationstyler-sync-license-label"
      style="min-width:120px; font-weight:600; font-size:13px;"></html:label>
    <html:input id="prefs-license-input" type="text"
      style="flex:1; padding:6px 10px; border:1px solid #ccc; border-radius:4px; font-family:monospace; font-size:13px;" />
  </hbox>

  <!-- Buttons -->
  <hbox align="center" style="margin-bottom:6px; gap:8px;">
    <html:button id="prefs-verify-btn" data-l10n-id="citationstyler-sync-verify-btn"
      style="padding:6px 18px; font-weight:600; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;">
    </html:button>
    <html:button id="prefs-logout-btn" data-l10n-id="citationstyler-sync-clear-btn"
      style="padding:6px 18px; font-size:13px; font-weight:600; color:#888; border:1px solid #ccc; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center;">
    </html:button>
    <html:button id="prefs-copy-logs-btn" data-l10n-id="citationstyler-sync-copy-logs-btn"
      style="padding:6px 14px; font-size:13px; font-weight:600; color:#888; border:1px solid #ccc; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center;">
    </html:button>
  </hbox>

  <!-- Status / logs feedback -->
  <html:div id="prefs-logs-status" style="margin-bottom:4px; min-height:16px; font-size:12px;" />
  <html:div id="prefs-status"
    style="margin-bottom:10px; min-height:18px; font-size:13px;" />

  <!-- Styles list -->
  <html:div id="prefs-styles-container"
    style="min-height:60px;" />

  <!-- Update row -->
  <html:div id="prefs-update-row" style="display:none; margin-top:10px; align-items:center;">
    <html:button id="prefs-check-updates-btn" data-l10n-id="citationstyler-sync-update-btn"
      style="padding:6px 18px; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;">
    </html:button>
    <html:div id="prefs-update-status"
      style="margin-left:12px; font-size:13px;" />
  </html:div>

</groupbox>
